spring.application.name=shipment-service
server.port=8082
spring.kafka.bootstrap-servers=ec2-15-165-50-217.ap-northeast-2.compute.amazonaws.com:9092

spring.kafka.consumer.group-id=shipping-service
spring.kafka.consumer.auto-offset-reset=latest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.nova.commerce.shipping.event.OrderPaidEvent
