<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>Nova Commerce Order Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f7f7f7; }
        .box { background: white; padding: 24px; border-radius: 12px; max-width: 820px; }
        button { margin: 6px; padding: 10px 14px; cursor: pointer; }
        input { width: 520px; padding: 8px; margin: 8px 0; }
        pre { background: #111; color: #0f0; padding: 16px; border-radius: 8px; overflow: auto; }
        .hint { color: #666; font-size: 14px; }
    </style>
</head>
<body>
<div class="box">
    <h2>Nova Commerce 주문 이벤트 테스트</h2>

    <label for="orderId">Order ID</label><br/>
    <input id="orderId" placeholder="주문 생성 후 자동 입력됨" />

    <p class="hint">[주문 생성 → 조회 → 결제 → 조회 → 배송 시작 → 조회] 순서로 상태 변화를 확인하세요.</p>

    <div>
        <button onclick="createOrder()">주문 생성</button>
        <button onclick="getOrder()">주문 조회</button>
        <button onclick="payOrder()">결제</button>
        <button onclick="shipOrder()">배송 시작</button>
        <button onclick="deliverOrder()">배송 완료</button>
        <button onclick="requestReturn()">반품 요청</button>
        <button onclick="returnOrder()">반품 완료</button>
        <button onclick="refundOrder()">환불 완료</button>
    </div>

    <h3>결과</h3>
    <pre id="result">ready</pre>
</div>

<script>
    const result = document.getElementById("result");
    const orderIdInput = document.getElementById("orderId");

    function print(data) {
        result.textContent = typeof data === "string"
            ? data
            : JSON.stringify(data, null, 2);
    }

    async function createOrder() {
        try {
            print("주문 생성 요청 중...");

            const res = await fetch("/api/orders", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    userId: "USER-001",
                    channel: "APP",
                    couponId: "CPN-WELCOME-001",
                    items: [
                        {
                            productId: "PRODUCT-001",
                            productName: "Classic T-Shirt",
                            category: "FASHION",
                            quantity: 2,
                            unitPrice: 29500
                        },
                        {
                            productId: "PRODUCT-002",
                            productName: "Daily Granola",
                            category: "FOOD",
                            quantity: 1,
                            unitPrice: 12900
                        }
                    ]
                })
            });

            const text = await res.text();

            if (!res.ok) {
                print(`주문 생성 실패 / HTTP ${res.status}\n\n${text}`);
                return;
            }

            const data = JSON.parse(text);
            orderIdInput.value = data.orderId;
            print(data);


        } catch (e) {
            print("주문 생성 중 JS 에러 발생:\n" + e.message);
        }
    }

    async function getOrder() {
        try {
            const orderId = orderIdInput.value;

            if (!orderId) {
                print("조회할 Order ID가 없습니다. 먼저 주문을 생성하세요.");
                return;
            }

            print("주문 조회 요청 중...");

            const res = await fetch(`/api/orders/${orderId}`, {
                method: "GET"
            });

            const text = await res.text();

            if (!res.ok) {
                print(`주문 조회 실패 / HTTP ${res.status}\n\n${text}`);
                return;
            }

            const data = JSON.parse(text);
            print(data);

        } catch (e) {
            print("주문 조회 중 JS 에러 발생:\n" + e.message);
        }
    }

    async function callAction(path, label) {
        try {
            const orderId = orderIdInput.value;

            if (!orderId) {
                print("먼저 주문을 생성하세요.");
                return;
            }

            print(`${label} 요청 중...`);

            const res = await fetch(`/api/orders/${orderId}/${path}`, {
                method: "POST"
            });

            const text = await res.text();

            if (!res.ok) {
                print(`${label} 실패 / HTTP ${res.status}\n\n${text}`);
                return;
            }

            print(`${label} 성공 / HTTP ${res.status}\n\n상태 확인은 [주문 조회] 버튼을 누르세요.`);

        } catch (e) {
            print(`${label} 중 JS 에러 발생:\n` + e.message);
        }
    }

    function payOrder() {
        callAction("pay", "결제");
    }

    async function shipOrder() {

        try {
            const orderId = orderIdInput.value;

            if (!orderId) {
                print("먼저 주문을 생성하세요.");
                return;
            }

            print("배송 시작 요청 중...");

            const res = await fetch(
                `http://localhost:8082/api/shipping/${orderId}/ship`,
                {
                    method: "POST"
                }
            );

            const text = await res.text();

            if (!res.ok) {
                print(`배송 시작 실패 / HTTP ${res.status}\n\n${text}`);
                return;
            }

            print("배송 시작 성공\n\n상태 확인은 [주문 조회] 버튼을 누르세요.");

        } catch (e) {
            print("배송 시작 중 JS 에러 발생:\n" + e.message);
        }
    }

    async function deliverOrder() {

        try {
            const orderId = orderIdInput.value;

            if (!orderId) {
                print("먼저 주문을 생성하세요.");
                return;
            }

            print("배송 완료 요청 중...");

            const res = await fetch(
                `http://localhost:8082/api/shipping/${orderId}/deliver`,
                {
                    method: "POST"
                }
            );

            const text = await res.text();

            if (!res.ok) {
                print(`배송 완료 실패 / HTTP ${res.status}\n\n${text}`);
                return;
            }

            print("배송 완료 성공\n\n상태 확인은 [주문 조회] 버튼을 누르세요.");

        } catch (e) {
            print("배송 완료 중 JS 에러 발생:\n" + e.message);
        }
    }

    function requestReturn() {
        callAction("return-request", "반품 요청");
    }

    function returnOrder() {
        callAction("return", "반품 완료");
    }

    function refundOrder() {
        callAction("refund", "환불 완료");
    }
</script>
</body>
</html>
